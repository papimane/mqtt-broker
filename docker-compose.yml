services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  ts601-codec:
    build:
      context: ./services/ts601-codec
    container_name: ts601-codec
    restart: unless-stopped
    environment:
      MQTT_URL: mqtt://mosquitto:1883
      MQTT_USERNAME: ""
      MQTT_PASSWORD: ""

      UPLINK_SUBSCRIBE: ts/+/uplink
      DECODED_PUBLISH_PREFIX: decoded/

      # Topic d'entrée pour les commandes JSON (séparé du topic device)
      CMD_SUBSCRIBE: cmd/ts/+/downlink
      # Les bytes encodés sont publiés directement sur "ts/[SN]/downlink" (topic device)
      DEVICE_DOWNLINK_PUBLISH_PREFIX: ""
      # Optionnel: copie debug sur "encoded/ts/[SN]/downlink" (mettre vide pour désactiver)
      DOWNLINK_DEBUG_PUBLISH_PREFIX: encoded/

      # Format du payload uplink entrant (si ce n'est PAS une enveloppe JSON {topic,payload})
      # Valeurs: hex | base64 | json_bytes
      CODEC_INPUT_FORMAT: ${CODEC_INPUT_FORMAT:-auto}
      # Format des octets sortants pour les downlinks encodés
      # Valeurs: hex | base64 | json_bytes
      CODEC_OUTPUT_BYTES_FORMAT: ${CODEC_OUTPUT_BYTES_FORMAT:-hex}
    depends_on:
      - mosquitto

  mqtt-ui:
    image: emqx/mqttx-web:latest
    container_name: mqtt-ui
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - mosquitto

volumes:
  mosquitto_data:
  mosquitto_log:

