services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  ts601-codec:
    build:
      context: ./services/ts601-codec
    container_name: ts601-codec
    restart: unless-stopped
    environment:
      MQTT_URL: mqtt://mosquitto:1883
      MQTT_USERNAME: ""
      MQTT_PASSWORD: ""

      UPLINK_SUBSCRIBE: ts601/uplink/#
      DECODED_PUBLISH_PREFIX: ts601/decoded/

      CMD_SUBSCRIBE: ts601/cmd/#
      DOWNLINK_PUBLISH_PREFIX: ts601/downlink/

      CODEC_INPUT_FORMAT: hex
      CODEC_OUTPUT_BYTES_FORMAT: hex
    depends_on:
      - mosquitto

  mqtt-ui:
    image: emqx/mqttx-web:latest
    container_name: mqtt-ui
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - mosquitto

volumes:
  mosquitto_data:
  mosquitto_log:

