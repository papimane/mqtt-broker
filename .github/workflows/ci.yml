name: CI

on:
  pull_request: {}
  push:
    branches: ["main"]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/ts601-codec/package-lock.json
      - name: Unit tests (ts601-codec)
        working-directory: services/ts601-codec
        run: |
          npm ci
          npm test

  functional-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Functional smoke (docker compose)
        run: |
          chmod +x tools/functional-smoke.sh
          ./tools/functional-smoke.sh

